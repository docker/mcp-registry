name: officemaker
type: remote
dynamic:
  tools: true
meta:
  category: productivity
  tags:
    - productivity
    - documents
    - word
    - excel
    - powerpoint
    - office
    - remote
about:
  title: OfficeMaker
  description: Create Microsoft Office documents — Word, Excel, and PowerPoint — from structured JSON specifications using AI agents
  icon: https://www.google.com/s2/favicons?domain=officemaker.ai&sz=64
remote:
  transport_type: streamable-http
  url: https://docs.officemaker.ai/mcp
  headers:
    X-Document-Service-User-Api-Key: "${OFFICEMAKER_API_KEY}"
config:
  secrets:
    - name: officemaker.api_key
      env: OFFICEMAKER_API_KEY
      example: <YOUR_API_KEY>
