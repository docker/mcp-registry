name: yolfi
type: remote
dynamic:
  tools: true
meta:
  category: payments
  tags:
    - payments
    - crypto
    - stablecoins
    - checkout
    - webhooks
    - remote
about:
  title: Yolfi Payments
  description: Add non-custodial crypto checkout, payment links, signed webhooks, and payment verification to applications
  icon: https://app.yolfi.com/favicon.ico
remote:
  transport_type: streamable-http
  url: https://app.yolfi.com/mcp
oauth:
  - provider: yolfi
    secret: yolfi.personal_access_token
    env: YOLFI_PERSONAL_ACCESS_TOKEN
