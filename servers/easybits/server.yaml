name: easybits
type: remote
dynamic:
  tools: true
meta:
  category: cloud-storage
  tags:
    - storage
    - files
    - databases
    - documents
    - websites
    - forms
    - ai-tools
    - remote
about:
  title: EasyBits
  description: Cloud storage and AI toolkit for agents. Upload files, create databases, generate documents and presentations, build websites, and manage forms — all from your AI assistant.
  icon: https://www.google.com/s2/favicons?domain=easybits.cloud&sz=64
remote:
  transport_type: streamable-http
  url: https://www.easybits.cloud/api/mcp
  headers:
    Authorization: "Bearer ${EASYBITS_API_KEY}"
config:
  secrets:
    - name: easybits.api_key
      env: EASYBITS_API_KEY
      example: <YOUR_API_KEY>
source:
  project: https://github.com/blissito/easybits
