name: meilisearch-mcp
image: mcp/meilisearch
type: server
meta:
  category: search
  tags:
    - search
about:
  title: Meilisearch
  description: Manage your indices, keys and tasks in Meilisearch
  icon: https://avatars.githubusercontent.com/u/43250847?s=200&v=4
source:
  project: https://github.com/ja7ad/meilisearch-mcp
  branch: main
run:
  command:
    - serve
    - stdio
config:
  description: Configure the connection to Meilisearch
  secrets:
    - name: meilisearch.api_key
      env: MEILI_API_KEY
      example: your-master-key
  env:
    - name: MEILI_HOST
      example: http://localhost:7700
      value: "{{meilisearch.url}}"
  parameters:
    type: object
    properties:
      url:
        type: string
    required:
      - url
