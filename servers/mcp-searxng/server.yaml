name: mcp-searxng
image: mcp/mcp-searxng
type: server
meta:
  category: search
  tags:
    - search
    - web-search
    - searxng
about:
  title: SearXNG
  description: Web search and URL content reading via a self-hosted SearXNG instance. Performs searches and converts web pages to Markdown.
  icon: https://docs.searxng.org/_static/searxng-wordmark.svg
source:
  project: https://github.com/ihor-sokoliuk/mcp-searxng
  commit: 4edc3d2e6eb902bb7ee75784f5ddda1c6cfc7a56
config:
  description: Configure the connection to your SearXNG instance
  env:
    - name: SEARXNG_URL
      example: http://localhost:8080
      value: "{{mcp-searxng.searxng_url}}"
  parameters:
    type: object
    properties:
      searxng_url:
        type: string
        description: URL of the SearXNG instance
    required:
      - searxng_url
