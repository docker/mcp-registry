name: serpdive
type: remote
dynamic:
  tools: true
meta:
  category: search
  tags:
    - search
    - web-search
    - ai
    - remote
about:
  title: SERPdive
  description: "Real-time web search with answer-ready results: extracted page content instead of links. A Tavily alternative: same speed, 20.2% fewer tokens, higher answer quality (60.7% of decided duels won) on a public benchmark."
  icon: https://raw.githubusercontent.com/serpdive/serpdive-mcp/main/assets/logo-400.png
remote:
  transport_type: streamable-http
  url: https://mcp.serpdive.com/mcp
  headers:
    Authorization: "Bearer ${SERPDIVE_API_KEY}"
config:
  secrets:
    - name: serpdive.api_key
      env: SERPDIVE_API_KEY
      example: <YOUR_SERPDIVE_API_KEY>
