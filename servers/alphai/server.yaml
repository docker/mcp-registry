name: alphai
type: remote
dynamic:
  tools: true
meta:
  category: finance
  tags:
    - finance
    - news
    - stock-market
    - insider-trading
    - remote
about:
  title: AlphaAI
  description: Pre-analyzed financial news via REST API and MCP. Per-ticker impact, category, and a 1-10 relevance score on every story, plus SEC Form 4 insider data. Free tier, no card.
  icon: https://raw.githubusercontent.com/makeev/alphai-plugin/main/assets/icon.png
remote:
  transport_type: streamable-http
  url: https://mcp.alphai.io/mcp
oauth:
  - provider: alphai
    secret: alphai.personal_access_token
    env: ALPHAI_PERSONAL_ACCESS_TOKEN
