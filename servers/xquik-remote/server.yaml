name: xquik-remote
type: remote
dynamic:
  tools: true
meta:
  category: web-scraping
  tags:
    - web-scraping
    - social-media
    - twitter
    - x
    - automation
    - monitoring
    - data-extraction
    - remote
about:
  title: Xquik
  description: X API automation platform for tweet search, user lookup, monitoring, webhooks, extraction jobs, giveaways, and confirmed write workflows.
  icon: https://www.google.com/s2/favicons?domain=xquik.com&sz=64
source:
  project: https://github.com/Xquik-dev/x-twitter-scraper
remote:
  transport_type: streamable-http
  url: https://xquik.com/mcp
  headers:
    x-api-key: "${XQUIK_REMOTE_API_KEY}"
config:
  description: Configure the connection to Xquik
  secrets:
    - name: xquik-remote.api_key
      env: XQUIK_REMOTE_API_KEY
      example: xq_YOUR_API_KEY_HERE
