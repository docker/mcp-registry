name: xquik-remote
type: remote
dynamic:
  tools: true
meta:
  category: social-media
  tags:
    - social-media
    - twitter
    - x
    - monitoring
    - data-extraction
    - remote
about:
  title: Xquik
  description: X and Twitter data workflows through a remote MCP endpoint for tweet search, profile lookup, follower exports, monitors, webhooks, giveaway draws, and confirmation-gated write actions.
  icon: https://xquik.com/icon.svg
source:
  project: https://github.com/Xquik-dev/x-twitter-scraper
remote:
  transport_type: streamable-http
  url: https://xquik.com/mcp
  headers:
    x-api-key: "${XQUIK_API_KEY}"
config:
  description: Configure the connection to Xquik
  secrets:
    - name: xquik-remote.api_key
      env: XQUIK_API_KEY
      example: xq_YOUR_API_KEY_HERE
