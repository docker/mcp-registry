name: carbone
image: mcp/carbone
type: server
meta:
  category: productivity
  tags:
    - document-generation
    - pdf
    - templates
    - productivity
about:
  title: Carbone
  description: The official MCP server for Carbone, enabling AI assistants to automate document generation, conversion, and templating across 100+ formats including PDF, DOCX, XLSX, PPTX, MD, and HTML.
  icon: https://avatars.githubusercontent.com/u/84321946?v=4
source:
  project: https://github.com/carboneio/carbone-mcp
  branch: master
  commit: 6f03215d0cff71482175fb9e99c62f303e917f13
config:
  description: Configure the connection to Carbone API
  secrets:
    - name: carbone.api_key
      env: CARBONE_API_KEY
      example: <CARBONE_API_KEY>
  env:
    - name: CARBONE_BASE_URL
      example: https://api.carbone.io
      value: "{{carbone.carbone_base_url}}"
  parameters:
    type: object
    properties:
      carbone_base_url:
        type: string
        description: Carbone API base URL. Defaults to https://api.carbone.io for cloud; change for on-premise deployments.
        default: https://api.carbone.io
