name: whisper
type: remote
dynamic:
  tools: true
meta:
  category: security
  tags:
    - security
    - remote
about:
  title: WhisperGraph
  description: Query WhisperGraph, an internet infrastructure graph database of DNS, BGP, IP allocation, WHOIS, and threat intelligence, for attack-surface mapping and indicator assessment
  icon: https://www.google.com/s2/favicons?domain=whisper.security&sz=64
remote:
  transport_type: streamable-http
  url: https://mcp.whisper.security/
oauth:
  - provider: whisper
    secret: whisper.personal_access_token
    env: WHISPER_PERSONAL_ACCESS_TOKEN
