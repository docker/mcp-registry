name: signoz-mcp
type: remote
dynamic:
  tools: true
meta:
  category: monitoring
  tags:
    - monitoring
    - observability
    - traces
    - logs
    - metrics
    - alerts
    - remote
about:
  title: SigNoz
  description: Query metrics, traces, logs, alerts, and dashboards in your SigNoz cloud instance using natural language.
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/signoz.png
remote:
  transport_type: streamable-http
  url: https://mcp.us.signoz.cloud/mcp
oauth:
  - provider: signoz-mcp
    secret: signoz-mcp.personal_access_token
    env: SIGNOZ_MCP_PERSONAL_ACCESS_TOKEN
