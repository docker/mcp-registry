name: latchshot
type: remote
dynamic:
  tools: true
meta:
  category: tools
  tags:
    - browser-automation
    - screenshots
    - pdf
    - developer-tools
    - remote
about:
  title: Latchshot
  description: Capture guarded PNG, JPEG, and PDF artifacts from public web pages with hosted Chromium, inline MCP output, and successful-render quota reporting.
  icon: https://latchshot.fly.dev/favicon.svg
remote:
  transport_type: streamable-http
  url: https://latchshot.fly.dev/mcp
  headers:
    Authorization: "Bearer ${LATCHSHOT_API_KEY}"
config:
  description: Create a recurring Free-plan key at https://latchshot.fly.dev/#trial and store it as a Docker MCP secret.
  secrets:
    - name: latchshot.api_key
      env: LATCHSHOT_API_KEY
      example: <YOUR_API_KEY>
