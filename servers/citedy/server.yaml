name: citedy
type: remote
dynamic:
  tools: true
meta:
  category: marketing
  tags:
    - marketing
    - seo
    - content
    - automation
    - remote
about:
  title: Citedy
  description: Generate SEO content, publish articles, scan AI visibility, analyze competitors, and manage content workflows from MCP clients.
  icon: https://www.citedy.com/logo.svg
remote:
  transport_type: streamable-http
  url: https://mcp.citedy.com/mcp
  headers:
    Authorization: "Bearer ${CITEDY_API_KEY}"
config:
  secrets:
    - name: citedy.api_key
      env: CITEDY_API_KEY
      example: citedy_agent_...
