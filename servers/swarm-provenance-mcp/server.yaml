about:
  title: Swarm Provenance MCP
  description: MCP server for managing Swarm postage stamps and provenance data storage. Enables AI agents to purchase stamps, upload/download data to the decentralized Swarm network, and manage immutable provenance records.
  icon: https://avatars.githubusercontent.com/u/38422498?s=200&v=4
source:
  project: https://github.com/datafund/swarm_provenance_MCP
  branch: main
  commit: c119cf5fdd3b27fc5d50732611b8d005821eb19f
config:
  description: Configure the connection to the Swarm gateway
  env:
    - name: SWARM_GATEWAY_URL
      example: https://provenance-gateway.datafund.io
    - name: DEFAULT_STAMP_AMOUNT
      example: "2000000000"
    - name: DEFAULT_STAMP_DEPTH
      example: "17"
