name: zai-web-reader
type: remote
meta:
  category: web
  tags:
    - web
    - reader
    - ai
    - remote
about:
  title: Z.AI Web Reader
  description: Web content extraction service that retrieves webpage content including title, main body text, metadata, and links for any specified URL.
  icon: https://www.google.com/s2/favicons?domain=z.ai&sz=64
remote:
  transport_type: streamable-http
  url: https://api.z.ai/api/mcp/web_reader/mcp
  headers:
    Authorization: "Bearer ${Z_AI_API_KEY}"
config:
  secrets:
    - name: zai-web-reader.z_ai_api_key
      env: Z_AI_API_KEY
      example: <Z_AI_API_KEY>
