name: arm-mcp
image: armlimited/arm-mcp:2.4.0
type: server
meta:
  category: developer-tools
  tags:
    - arm
    - migration
    - docker
    - architecture
    - development
about:
  title: Arm
  description: Provides AI assistants with specialized tools for Arm architecture development, migration, optimization, and profiling. Includes knowledge base search, code migration analysis, container architecture inspection, Arm Performix workload profiling, and assembly performance analysis.
  icon: https://avatars.githubusercontent.com/u/184160443?s=200&v=4
source:
  project: https://github.com/arm/mcp
  commit: f579c0867221045160acbff6c4c836df5c5a43af
run:
  volumes:
    - "{{arm-mcp.workspace_path}}:/workspace"
    - "{{arm-mcp.ssh_private_key_path}}:/run/keys/ssh-key.pem:ro"
    - "{{arm-mcp.ssh_known_hosts_path}}:/run/keys/known_hosts:ro"
config:
  description: Add the directory you want the Arm MCP server to access. Arm Performix can optionally use SSH private key and known_hosts file mounts for remote target access.
  parameters:
    type: object
    properties:
      workspace_path:
        type: string
        default: /Users/local-test
      ssh_private_key_path:
        type: string
        description: Optional path to an SSH private key for Arm Performix remote target access
      ssh_known_hosts_path:
        type: string
        description: Optional path to an SSH known_hosts file for Arm Performix remote target access
    required:
      - workspace_path
