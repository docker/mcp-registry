name: zai-zread
type: remote
meta:
  category: developer-tools
  tags:
    - code
    - github
    - documentation
    - remote
about:
  title: Z.AI Zread
  description: Code reading service that enables agents to access open source repository documentation, directory structures, and file contents from GitHub repositories.
  icon: https://www.google.com/s2/favicons?domain=z.ai&sz=64
remote:
  transport_type: streamable-http
  url: https://api.z.ai/api/mcp/zread/mcp
  headers:
    Authorization: "Bearer ${Z_AI_API_KEY}"
config:
  secrets:
    - name: zai-zread.z_ai_api_key
      env: Z_AI_API_KEY
      example: <Z_AI_API_KEY>
