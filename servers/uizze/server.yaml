name: uizze
type: remote
dynamic:
  tools: true
meta:
  category: ai
  tags:
    - codex
    - ui-design
    - developer-tools
    - remote
about:
  title: UIZZE
  description: Help Codex stop shipping generic UI slop with real web and iOS references, design contracts, implementation checks, audits, and screenshot critiques. Also works with Claude Code and Cursor.
  icon: https://uizze.com/brand/icons/uizze-favicon-32x32.png
remote:
  transport_type: streamable-http
  url: https://uizze.com/mcp
  headers:
    Authorization: "Bearer ${UIZZE_AGENT_TOKEN}"
config:
  description: Use your UIZZE agent token from Agent Connector.
  secrets:
    - name: uizze.agent_token
      env: UIZZE_AGENT_TOKEN
      example: <YOUR_AGENT_TOKEN>
