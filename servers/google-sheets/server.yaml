name: google-sheets
image: mcp/google-sheets
type: server
meta:
  category: productivity
  tags:
    - google-sheets
    - google-workspace
    - spreadsheets
    - data
    - oauth2
about:
  title: Google Sheets
  description: >-
    A fully-featured MCP server for Google Sheets with 28 tools covering
    reading, writing, batch operations, sheet management, row/column
    manipulation, data cleaning, formatting, and conditional formatting
    via OAuth 2.0.
  icon: https://www.gstatic.com/images/branding/product/1x/sheets_2020q4_48dp.png
source:
  project: https://github.com/adalpan/google-sheets-mcp
  branch: main
  dockerfile: Dockerfile
config:
  volumes:
    - name: google-sheets-data
      path: /data
      description: Mount a local folder containing credentials.json (OAuth 2.0 Desktop App). A token.json will be saved here after first login.
