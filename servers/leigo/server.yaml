name: leigo
type: remote
dynamic:
  tools: true
meta:
  category: legal
  tags:
    - legal
    - portuguese-law
    - legislation
    - rag
about:
  title: LeiGo — Portuguese Legal Assistant
  description: >
    Semantic search and AI-powered Q&A across consolidated Portuguese legislation
    (Diário da República). Five tools: search laws by query, fetch specific
    articles by number, ask a full RAG-powered legal question with citations,
    list indexed sources, and check your subscription usage.
  icon: https://leigo.pt/favicon.ico
remote:
  transport_type: streamable-http
  url: https://api.leigo.pt/pt_law_chatbot/mcp
oauth:
  - provider: leigo
    secret: leigo.api_key
    env: LEIGO_API_KEY
