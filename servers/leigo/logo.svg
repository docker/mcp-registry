<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Navy background, rounded square -->
  <rect width="256" height="256" rx="48" fill="#1B2F5C"/>

  <!-- Scales of Justice -->
  <!-- Vertical pole -->
  <line x1="128" y1="58" x2="128" y2="170" stroke="#D4A843" stroke-width="10" stroke-linecap="round"/>
  <!-- Top cap -->
  <circle cx="128" cy="52" r="11" fill="#D4A843"/>
  <!-- Horizontal beam -->
  <line x1="52" y1="86" x2="204" y2="86" stroke="#D4A843" stroke-width="9" stroke-linecap="round"/>

  <!-- Left pan (centered x=80) -->
  <!-- Hanging strings -->
  <line x1="66" y1="86" x2="56" y2="128" stroke="#D4A843" stroke-width="4" stroke-linecap="round"/>
  <line x1="94" y1="86" x2="104" y2="128" stroke="#D4A843" stroke-width="4" stroke-linecap="round"/>
  <!-- Bowl arc -->
  <path d="M52 128 Q80 152 108 128" fill="none" stroke="#D4A843" stroke-width="5" stroke-linecap="round"/>

  <!-- Right pan (centered x=176) -->
  <!-- Hanging strings -->
  <line x1="162" y1="86" x2="152" y2="128" stroke="#D4A843" stroke-width="4" stroke-linecap="round"/>
  <line x1="190" y1="86" x2="200" y2="128" stroke="#D4A843" stroke-width="4" stroke-linecap="round"/>
  <!-- Bowl arc -->
  <path d="M148 128 Q176 152 204 128" fill="none" stroke="#D4A843" stroke-width="5" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="102" y1="170" x2="154" y2="170" stroke="#D4A843" stroke-width="8" stroke-linecap="round"/>
  <line x1="84" y1="184" x2="172" y2="184" stroke="#D4A843" stroke-width="10" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="128" y="228"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="32"
        font-weight="bold"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="2">LeiGo</text>
</svg>
