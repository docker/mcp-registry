<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="256" height="256">
  <!-- Navy background, rounded square -->
  <rect width="64" height="64" rx="12" fill="#1B2F5C"/>

  <!-- Outer ring (r=22) -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="white" stroke-width="2.2"/>

  <!-- 12 ticks at 30° intervals (r1=24, r2=27) -->
  <line x1="56.00" y1="32.00" x2="59.00" y2="32.00" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="52.78" y1="44.00" x2="55.38" y2="45.50" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="44.00" y1="52.78" x2="45.50" y2="55.38" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="32.00" y1="56.00" x2="32.00" y2="59.00" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="20.00" y1="52.78" x2="18.50" y2="55.38" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="11.22" y1="44.00" x2="8.62"  y2="45.50" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="8.00"  y1="32.00" x2="5.00"  y2="32.00" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="11.22" y1="20.00" x2="8.62"  y2="18.50" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="20.00" y1="11.22" x2="18.50" y2="8.62"  stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="32.00" y1="8.00"  x2="32.00" y2="5.00"  stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="44.00" y1="11.22" x2="45.50" y2="8.62"  stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="52.78" y1="20.00" x2="55.38" y2="18.50" stroke="white" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Serif L -->
  <text x="32" y="42"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="26"
        font-weight="500"
        fill="white"
        text-anchor="middle">L</text>
</svg>
