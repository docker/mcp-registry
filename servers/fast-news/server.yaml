name: fast-news
type: remote
meta:
  category: news
  tags:
    - news
    - search
    - rapidapi
    - remote
about:
  title: Fast News
  description: Real-time news search, trending headlines in 40+ languages, topic categories, and local news via the Fast News with Previews API on RapidAPI, with source diversity, deduplication, and clean article previews.
  icon: https://raw.githubusercontent.com/wllrdev/Fast-News-MCP/master/assets/logo.png
remote:
  transport_type: streamable-http
  url: https://mcp.rapidapi.com
  headers:
    x-api-host: "fast-news-with-previews.p.rapidapi.com"
    x-api-key: "${RAPIDAPI_KEY}"
config:
  secrets:
    - name: fast-news.api_key
      env: RAPIDAPI_KEY
      example: <YOUR_RAPIDAPI_KEY>
