name: domscan
type: remote
dynamic:
  tools: true
meta:
  category: security
  tags:
    - security
    - dns
    - whois
    - osint
    - domain
    - remote
about:
  title: DomScan
  description: Investigate domain availability, DNS, WHOIS/RDAP, TLS, reputation, and brand risks
  icon: https://raw.githubusercontent.com/estevecastells/domscan-mcp/master/assets/domscan-icon.png
remote:
  transport_type: streamable-http
  url: https://domscan.net/mcp
oauth:
  - provider: domscan
    secret: domscan.personal_access_token
    env: DOMSCAN_API_KEY
