config:
  description: Connect the MCP server to your A2E engine (product-api).
  secrets:
    - name: a2e.api_key
      env: A2E_API_KEY
      example: <your A2E API key>
  env:
    - name: A2E_API_BASE
      example: http://localhost:8088
      value: "{{a2e.api_base}}"
  parameters:
    type: object
    properties:
      api_base:
        type: string
    required:
      - api_base
