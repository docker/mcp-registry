name: buywhere-remote
type: remote
dynamic:
  tools: true
meta:
  category: e-commerce
  tags:
    - e-commerce
    - search
    - shopping
    - price-comparison
    - southeast-asia
    - remote
about:
  title: BuyWhere
  description: Real-time product search and price comparison across 260K+ products from Lazada, Shopee, FairPrice, Courts, and other Southeast Asia merchants. Helps AI agents find the best prices for products in Singapore and across SEA.
  icon: https://www.google.com/s2/favicons?domain=buywhere.ai&sz=64
remote:
  transport_type: streamable-http
  url: https://mcp.buywhere.ai/mcp
config:
  description: Configure the connection to BuyWhere MCP server
  secrets:
    - name: buywhere-remote.api_key
      env: BUYWHERE_API_KEY
      example: bw_xxxxxxxxxxxxxxxxxxxxxxxx
