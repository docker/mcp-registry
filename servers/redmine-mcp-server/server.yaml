name: redmine-mcp-server
image: mcp/redmine-mcp-server
type: server
meta:
  category: productivity
  tags:
    - redmine
    - issues
    - project-management
    - productivity
about:
  title: Redmine
  description: MCP server for Redmine REST API, including issues, projects, users, wiki, time entries, and attachments.
  icon: https://www.google.com/s2/favicons?domain=redmine.org&sz=64
source:
  project: https://github.com/Nikhilprasad-r/redmine-mcp-server
  commit: 9e34e888a52d91e194838eef9fe549c100668e1a
config:
  description: Configure access and safety options for Redmine.
  secrets:
    - name: redmine-mcp-server.api_key
      env: REDMINE_API_KEY
      example: your_redmine_api_key
  env:
    - name: REDMINE_BASE_URL
      example: https://redmine.example.com
      value: "{{redmine-mcp-server.base_url}}"
    - name: REDMINE_IMPERSONATE_USER
      example: ""
      value: "{{redmine-mcp-server.impersonate_user}}"
    - name: REDMINE_READONLY
      example: "true"
      value: "{{redmine-mcp-server.readonly}}"
    - name: REDMINE_ALLOW_RAW_REQUEST
      example: "false"
      value: "{{redmine-mcp-server.allow_raw_request}}"
    - name: REDMINE_HTTP_TIMEOUT_MS
      example: "15000"
      value: "{{redmine-mcp-server.http_timeout_ms}}"
    - name: REDMINE_MAX_PAGES
      example: "20"
      value: "{{redmine-mcp-server.max_pages}}"
    - name: REDMINE_MAX_DOWNLOAD_BYTES
      example: "5242880"
      value: "{{redmine-mcp-server.max_download_bytes}}"
  parameters:
    type: object
    properties:
      base_url:
        type: string
      impersonate_user:
        type: string
      readonly:
        type: boolean
        default: false
      allow_raw_request:
        type: boolean
        default: false
      http_timeout_ms:
        type: integer
        default: 15000
      max_pages:
        type: integer
        default: 20
      max_download_bytes:
        type: integer
        default: 5242880
    required:
      - base_url
