name: postman-remote
type: remote
dynamic:
  tools: true
meta:
  category: devops
  tags:
    - devops
    - api
    - remote
    - collaboration
    - api-testing
about:
  title: Postman Remote
  description: Postman's MCP server connects AI agents, assistants, and chatbots directly to your APIs on Postman. Use natural language to prompt AI to automate work across your Postman collections, environments, workspaces, and more. This is the hosted remote version with the minimal toolset.
  icon: https://voyager.postman.com/logo/postman-logo-icon-orange.svg
remote:
  transport_type: streamable-http
  url: https://mcp.postman.com/minimal
oauth:
  - provider: postman-remote
    secret: postman-remote.personal_access_token
    env: POSTMAN_REMOTE_PERSONAL_ACCESS_TOKEN
