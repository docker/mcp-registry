name: cabin-flights
image: mcp/cabin-flights
type: server
meta:
  category: travel
  tags:
    - travel
    - flights
    - booking
    - crypto
    - x402
    - micropayments
    - ai-agent
about:
  title: Cabin Flights
  description: AI-first travel booking with natural language. Search and book real flights with crypto micropayments (x402). Enables AI assistants to search flights, check prices, handle group bookings, and process payments using USDC on Base/Ethereum networks.
  icon: https://www.google.com/s2/favicons?domain=cabin.com&sz=64
source:
  project: https://github.com/yolo-maxi/cabin
  subfolder: packages/agent
  commit: dad136c22f0f9e5a3e0e3c2e1e4f2e3e4f5f6f7f
config:
  description: Configure the connection to Cabin Flights MCP server
  secrets:
    - name: cabin-flights.x402_private_key
      env: X402_PRIVATE_KEY
      example: 0x1234567890abcdef1234567890abcdef12345678901234567890abcdef12345678
  env:
    - name: CABIN_API_URL
      example: https://api.cabin.team
      value: "{{cabin-flights.api_url}}"
    - name: X402_NETWORK
      example: base
      value: "{{cabin-flights.network}}"
    - name: LOG_LEVEL
      example: info
      value: "{{cabin-flights.log_level}}"
  parameters:
    type: object
    properties:
      api_url:
        type: string
        default: https://api.cabin.team
      network:
        type: string
        default: base
      log_level:
        type: string
        default: info