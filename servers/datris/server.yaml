name: datris
type: remote
dynamic:
  tools: true
meta:
  category: database
  tags:
    - data-platform
    - data-quality
    - etl
    - vector-search
    - postgresql
    - mongodb
    - remote
about:
  title: Datris
  description: "AI Agent-Native Data Platform — ingest, validate, transform, and query data. 35 tools covering ETL orchestration, AI-generated data quality rules, vector database search, and secrets-managed connectivity. Supports PostgreSQL, MongoDB, Kafka, S3/MinIO, HashiCorp Vault, and vector stores (Qdrant, Weaviate, Milvus, Chroma, pgvector)."
  icon: https://datris.ai/favicon.svg
remote:
  transport_type: sse
  url: https://mcp.trial.datris.ai/sse
  headers:
    x-api-key: "${DATRIS_API_KEY}"
config:
  secrets:
    - name: datris.api_key
      env: DATRIS_API_KEY
      example: <YOUR_API_KEY>
