name: runcomfy
type: remote
meta:
  category: ai
  tags:
    - comfyui
    - image-generation
    - video-generation
    - ai
    - remote
about:
  title: RunComfy MCP
  description: Run RunComfy Serverless (ComfyUI) GPU deployments and async image/video inference.
  icon: https://www.google.com/s2/favicons?domain=runcomfy.com&sz=64
remote:
  transport_type: streamable-http
  url: https://mcp.runcomfy.com/mcp
  headers:
    Authorization: "Bearer ${RUNCOMFY_API_KEY}"
config:
  secrets:
    - name: runcomfy.api_key
      env: RUNCOMFY_API_KEY
      example: <YOUR_RUNCOMFY_TOKEN>
