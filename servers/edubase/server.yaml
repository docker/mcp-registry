name: edubase
image: mcp/edubase
type: server
meta:
  category: devops
  tags:
    - edubase
    - devops
about:
  title: EduBase
  icon: https://avatars.githubusercontent.com/u/33938028?s=200&v=4
source:
  project: https://github.com/EduBase/MCP
  commit: c276e6f14d42bdf08aacfe2222440bc6bad57f50
config:
  description: Configure the connection to EduBase
  secrets:
    - name: edubase.api_key
      env: EDUBASE_API_KEY
      example: YOUR_EDUBASE_API_KEY
  env:
    - name: EDUBASE_API_APP
      example: YOUR_EDUBASE_API_APP
      value: "{{edubase.app}}"
    - name: EDUBASE_API_URL
      example: YOUR_EDUBASE_API_URL
      value: "{{edubase.url}}"
  parameters:
    type: object
    properties:
      app:
        type: string
      url:
        type: string
    required:
      - app
      - url
