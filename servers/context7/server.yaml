name: context7
type: remote
meta:
  category: documentation
  tags:
    - documentation
    - developer-tools
    - code-examples
    - remote
about:
  title: Context7
  description: Pull up-to-date, version-specific documentation and code examples for any library or framework straight into your prompt.
  icon: https://avatars.githubusercontent.com/u/74989412?s=200&v=4
remote:
  transport_type: streamable-http
  url: https://mcp.context7.com/mcp
  headers:
    CONTEXT7_API_KEY: "${CONTEXT7_API_KEY}"
config:
  description: Optionally provide a Context7 API key for higher rate limits (the server also works without one).
  secrets:
    - name: context7.api_key
      env: CONTEXT7_API_KEY
      example: <YOUR_API_KEY>
      required: false
