name: motomarks
type: remote
dynamic:
  tools: true
meta:
  category: developer-tools
  tags:
    - developer-tools
    - api
    - automotive
    - logos
    - cdn
    - remote
about:
  title: Motomarks
  description: Search car brands, fetch brand data, and build production-ready logo CDN URLs from the Motomarks automotive brand library.
  icon: https://www.google.com/s2/favicons?domain=motomarks.io&sz=64
remote:
  transport_type: streamable-http
  url: https://motomarks.io/api/mcp
oauth:
  - provider: motomarks
    secret: motomarks.personal_access_token
    env: MOTOMARKS_PERSONAL_ACCESS_TOKEN
