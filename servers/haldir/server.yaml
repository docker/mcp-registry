name: haldir
type: remote
dynamic:
  tools: true
meta:
  category: security
  tags:
    - ai
    - agents
    - governance
    - security
    - audit
    - compliance
    - remote
about:
  title: Haldir
  description: Governance layer for AI agents. Scoped sessions with spend caps, AES-256-GCM encrypted secrets, hash-chained tamper-evident audit trail, and policy enforcement proxy for every tool call. MIT licensed — also self-hostable with docker compose.
  icon: https://www.google.com/s2/favicons?domain=haldir.xyz&sz=64
source:
  project: https://github.com/ExposureGuard/haldir
remote:
  transport_type: streamable-http
  url: https://haldir.xyz/mcp
  headers:
    Authorization: "Bearer ${HALDIR_API_KEY}"
config:
  secrets:
    - name: haldir.api_key
      env: HALDIR_API_KEY
      example: hld_your_api_key_here
