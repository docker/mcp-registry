name: sendmux
type: remote
dynamic:
  tools: true
meta:
  category: communication
  tags:
    - communication
    - email
    - automation
    - remote
about:
  title: Sendmux
  description: Connect AI clients to Sendmux's email inbox, sending, and management APIs through browser OAuth, with tools limited to the access you authorise.
  icon: https://www.google.com/s2/favicons?domain=sendmux.ai&sz=64
remote:
  transport_type: streamable-http
  url: https://mcp.sendmux.ai/mcp
oauth:
  - provider: sendmux
    secret: sendmux.personal_access_token
    env: SENDMUX_PERSONAL_ACCESS_TOKEN
