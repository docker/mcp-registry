name: agentcard
type: remote
dynamic:
  tools: true
meta:
  category: payments
  tags:
    - payments
    - finance
    - virtual-cards
    - remote
about:
  title: Agentcard
  description: Virtual cards for AI agents. Fund a wallet, set spend caps and approvals, and your agent mints a one-time virtual card for each purchase.
  icon: https://www.agentcard.sh/logo-icon.png
remote:
  transport_type: streamable-http
  url: https://mcp.agentcard.sh/mcp
oauth:
  - provider: agentcard
    secret: agentcard.personal_access_token
    env: AGENTCARD_PERSONAL_ACCESS_TOKEN
