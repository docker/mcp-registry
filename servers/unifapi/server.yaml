name: unifapi
type: remote
dynamic:
  tools: true
meta:
  category: search
  tags:
    - search
    - public-data
    - social-media
    - web-scraping
    - news
    - remote
about:
  title: UnifAPI
  description: Hosted public-data MCP server for social, search, scrape, news, creator research, and KOL pricing workflows.
  icon: https://unifapi.com/unif.png
remote:
  transport_type: streamable-http
  url: https://mcp.unifapi.com
oauth:
  - provider: unifapi
    secret: unifapi.personal_access_token
    env: UNIFAPI_PERSONAL_ACCESS_TOKEN
