name: bargo-congress
type: remote
meta:
  category: finance
  tags:
    - finance
    - congressional-trading
    - stock-act
    - market-data
    - remote
about:
  title: Bargo Congress Trades
  description: Read normalized U.S. House and Senate STOCK Act trade disclosures
  icon: https://www.google.com/s2/favicons?domain=bargo.ai&sz=64
remote:
  transport_type: streamable-http
  url: https://www.bargo.ai/free-apis/congress/mcp
  headers:
    Authorization: "Bearer ${BARGO_CONGRESS_API_KEY}"
config:
  secrets:
    - name: bargo-congress.api_key
      env: BARGO_CONGRESS_API_KEY
      example: <YOUR_API_KEY>
