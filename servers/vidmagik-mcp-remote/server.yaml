name: vidmagik-mcp-remote
type: remote
dynamic:
    tools: true
meta:
    category: multi-media, productivity, other
    tags:
        - multi-media, productivity, other
        - remote
about:
    title: Un-Oficial full implementation of MoviePy v2.2.1 giving your Agents the ability of linear 2D video production
    description: 'Un-Oficial full implementation of MoviePy v2.2.1 includes all editing functions as tools + 11 custom advanced effects not shipped with MoviePy a small collection of fonts (120+) loaded as Resources and 8 prompts demonstrating the usage of most of the custom advanced effects. It also has resources as tools and prompts as tools implemented for compatibility with clients that only support tool usage i.e Antigravity. Both of these implementations automate the creation of 2 tools a tool to list the available resources/prompts, and a tool to use your chosen resource/prompt. Bringing the total tool count for the server to 102 at the time of writing this, meaning given the correct and proper instructions when defifning your agents you can create a fully functioning and very capable professional video editing and production team that is able to handle all editing and post-production tasks autonomously for you. '
    icon: https://i.ibb.co/kgbWWkZd/vidmagik-mcp-logo.png
remote:
    transport_type: streamable-http
    url: https://vidmagik-mcp.fly.dev/mcp
oauth:
    - provider: vidmagik-mcp-remote
      secret: vidmagik-mcp-remote.personal_access_token
      env: VIDMAGIK_MCP_REMOTE_PERSONAL_ACCESS_TOKEN
