  description: Host-owned vacation-rental direct booking via the Vacation Rental Protocol (VRP). AI agents discover host booking domains, verify host-signed stay offers (Ed25519/JWKS), read live availability and pricing, and route guests to the host's own direct booking URL. 0% booking commission, one all-inclusive total. Not an OTA, not a marketplace.
