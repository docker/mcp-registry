name: squirrelscan
type: remote
dynamic:
  tools: true
meta:
  category: monitoring
  tags:
    - seo
    - website-audit
    - accessibility
    - performance
    - security
    - remote
about:
  title: Squirrelscan
  description: Audit websites for SEO, performance, security, accessibility, and agent experience issues across 260+ rules, and get exact fixes for your coding agent.
  icon: https://squirrelscan.com/apple-touch-icon.png
remote:
  transport_type: streamable-http
  url: https://mcp.squirrelscan.com/mcp
oauth:
  - provider: squirrelscan
    secret: squirrelscan.personal_access_token
    env: SQUIRRELSCAN_PERSONAL_ACCESS_TOKEN
