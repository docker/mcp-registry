name: frihet
type: remote
dynamic:
  tools: true
meta:
  category: finance
  tags:
    - finance
    - invoicing
    - accounting
    - e-invoicing
    - spain
    - eu
    - erp
    - verifactu
    - ticketbai
    - facturae
about:
  title: Frihet ERP
  # TODO: replace with a stable hosted icon URL (e.g. https://avatars.githubusercontent.com/u/<Frihet-io-org-id>?v=4)
  # The Google favicon proxy is a placeholder and may break. Supply the real Frihet-io GitHub org avatar ID
  # or a CDN-hosted 64x64 PNG at docs.frihet.io/favicon.png before PR is merged.
  icon: https://avatars.githubusercontent.com/Frihet-io
  description: >-
    AI-native ERP — full ES/EU fiscal compliance and native e-invoicing
    (VeriFactu, TicketBAI, Facturae, XRechnung, Factur-X, FatturaPA, PEPPOL,
    FACe, KSeF) served on demand. 151 tools across invoicing, CRM, expenses,
    banking, deposits, quotes, products, vendors, recurring invoices, time
    tracking, HR, payroll, gestoria, POS, vacation rentals, fiscal models
    (303/130/390/180/347/415/425/418/M200/M202), GL audit, IGIC/AIEM, VIES
    lookup, period close, team management, webhooks, and AI insights.
    Version 1.12.0.
remote:
  transport_type: streamable-http
  url: https://mcp.frihet.io/mcp
oauth:
  - provider: frihet
    secret: frihet.personal_access_token
    env: FRIHET_PERSONAL_ACCESS_TOKEN
