name: trends-mcp
type: remote
meta:
  category: search
  tags:
    - search
    - trends
    - data
    - market-research
    - remote
about:
  title: TrendsMCP
  description: Live, normalized trend data for AI assistants across search, social, commerce, news, and developer platforms. Query keyword trends, growth metrics, and live trending feeds from Google, YouTube, TikTok, Reddit, Amazon, and more through one MCP endpoint.
  icon: https://www.google.com/s2/favicons?domain=trendsmcp.ai&sz=64
remote:
  transport_type: streamable-http
  url: https://api.trendsmcp.ai/mcp
  headers:
    Authorization: "Bearer ${TRENDSMCP_API_KEY}"
config:
  description: Configure your TrendsMCP API access
  secrets:
    - name: trends-mcp.api_key
      env: TRENDSMCP_API_KEY
      example: <YOUR_API_KEY>
