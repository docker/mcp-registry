# Docker MCP Catalog submission entry.
#
# Submit by adding this file to docker/mcp-registry at:
#   servers/vigil-compliance/server.yaml
# alongside a tools.json (see the sibling file). Build/validate with:
#   task build -- --tools vigil-compliance
# Verify field shapes against the current docker/mcp-registry CONTRIBUTING.md
# before opening the PR, since that schema evolves.

name: vigil-compliance
image: mcp/vigil-compliance
type: server
meta:
  category: security
  tags:
    - ai-safety
    - guardrails
    - compliance
    - oversight
    - audit
    - ai-agents
about:
  title: VIGIL Compliance
  description: >-
    A safety and compliance oversight layer for AI agents. Check risky actions
    before they run, get an allow / deny / hold decision, and keep a signed,
    auditable record so a human can monitor the agent and keep it in check.
    Connects with zero setup: the first tool call self-provisions a restricted
    trial key and prints a claim URL. Covers dangerous shell/SQL/secret-exfil
    actions plus consent, breach, DPIA, EU AI Act, India DPDP and more. VIGIL
    evaluates and records; the agent enforces the deny/hold.
  icon: https://vigil.costrinity.xyz/favicon.ico
source:
  project: https://github.com/COSTRINITY/vigil-compliance-mcp
  # Pin to the mirror's HEAD commit at submission time:
  # commit: <git rev-parse HEAD of COSTRINITY/vigil-compliance-mcp>
config:
  description: >-
    No configuration required to try it: the server self-provisions a restricted
    trial key on first use. Optional environment variables: VIGIL_EMAIL (own the
    trial account under a real address), VIGIL_OWNER_ID + VIGIL_API_KEY (use an
    existing key instead of a trial), VIGIL_BASE_URL (self-hosted VIGIL). None
    are secrets that must be supplied to start.
