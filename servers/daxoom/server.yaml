name: daxoom
type: remote
meta:
  category: search
  tags:
    - business-data
    - local-search
    - places
    - ai-visibility
    - remote
about:
  title: Daxoom — AI-Visibility Business Data
  description: Owner-verified local business data for AI agents — search, full profiles, hours, menu/service prices, attributes, owner Q&A, and AI-grounding context. Every response carries provenance (verification level, completeness, freshness, upstream sources).
  icon: https://raw.githubusercontent.com/CITROOT/daxoom-mcp/main/assets/logo.png
remote:
  transport_type: streamable-http
  url: https://mcp.daxoom.com/
  headers:
    X-API-Key: "${DAXOOM_API_KEY}"
config:
  secrets:
    - name: daxoom.api_key
      env: DAXOOM_API_KEY
      example: dxm_xxxxxxxxxxxxxxxxxxxx
