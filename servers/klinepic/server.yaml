  commit: c48f3dc12a21834a2af165c223230f0cf9500fef
config:
  description: Configure access to the KLinePic Agent API
  secrets:
    - name: klinepic.agent_api_key
      env: KLINE_AGENT_API_KEY
      example: <YOUR_KLINEPIC_AGENT_API_KEY>
