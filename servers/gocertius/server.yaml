name: gocertius
description: GoCertius MCP — certified evidence, dossiers, notifications and chats from EAD Trust's platform.
image: gdigital/gocertius:1.2.3
icon: https://unpkg.com/@g-digital/mcp-gocertius@1.2.3/assets/logo-400x400.png
about:
  homepage: https://github.com/g-digital-by-Garrigues/MCP_Market_Distribution
  publisher: g-digital by Garrigues
  license: MIT
source:
  repository: https://github.com/g-digital-by-Garrigues/MCP_Market_Distribution
  directory: pending-to-publish/gocertius
config:
  description: |
    Consumer credentials are required to run this MCP. See README for setup.
  env:
    - name: MCP_AUTH_EMAIL
      example: 
      description: Your GoCertius account email address
    - name: MCP_AUTH_PASSWORD
      example: 
      description: Your GoCertius account password (See https://www.gocertius.io for credential acquisition.)
    - name: MCP_OPENID_CLIENT_ID
      example: 
      description: OpenID Connect client ID
    - name: MCP_OPENID_ISSUER
      example: 
      description: OpenID Connect issuer URL
    - name: MCP_OPENID_REFRESH_TOKEN
      example: 
      description: OpenID Connect refresh token (See https://www.gocertius.io for credential acquisition.)
    - name: PORT
      example: 8080
      description: HTTP port when running in hosted (HTTP) mode; ignored in stdio mode
