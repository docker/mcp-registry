name: zai-web-search
type: remote
meta:
  category: search
  tags:
    - search
    - web
    - ai
    - remote
about:
  title: Z.AI Web Search
  description: Web search service that retrieves search results with titles, URLs, summaries, site names, and icons. Powered by GLM's search capabilities.
  icon: https://www.google.com/s2/favicons?domain=z.ai&sz=64
remote:
  transport_type: streamable-http
  url: https://api.z.ai/api/mcp/web_search_prime/mcp
  headers:
    Authorization: "Bearer ${Z_AI_API_KEY}"
config:
  secrets:
    - name: zai-web-search.z_ai_api_key
      env: Z_AI_API_KEY
      example: <Z_AI_API_KEY>
