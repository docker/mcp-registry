name: tnl-intelligence
type: remote
dynamic:
  tools: true
meta:
  category: news
  tags:
    - news
    - research
    - intelligence
    - evidence
    - remote
about:
  title: The Neural Ledger Intelligence
  description: Search and analyze source-linked global event intelligence with entities, assets, impact paths, and cited evidence
  icon: https://raw.githubusercontent.com/bekirdag/tnl-intelligence/main/integrations/openai/tnl-intelligence/assets/tnl-bot.png
remote:
  transport_type: streamable-http
  url: https://mcp.theneuralledger.com/mcp
  headers:
    Authorization: "Bearer ${TNL_API_KEY}"
config:
  description: Configure your The Neural Ledger member API key
  secrets:
    - name: tnl-intelligence.api_key
      env: TNL_API_KEY
      example: <YOUR_TNL_API_KEY>
