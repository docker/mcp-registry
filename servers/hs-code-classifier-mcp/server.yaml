name: hs-code-classifier-mcp
type: remote
meta:
  category: finance
  tags:
    - hs-code
    - customs
    - tariff
    - trade-compliance
    - classification
    - import-export
about:
  title: HS Code Classifier
  description: Classify product descriptions to HS codes using official government tariff schedules from USITC, Singapore Customs, CBSA, ABF, and WCO. Validates supplier-provided codes for misclassification.
  icon: https://www.google.com/s2/favicons?domain=kordagencies.com&sz=64
remote:
  transport:
    type: streamable-http
    url: https://hs-code-classifier-mcp-server-production.up.railway.app/mcp
config:
  secrets:
    - name: hs-code-classifier-mcp.api_key
      env: X_API_KEY
      example: your_api_key_from_kordagencies.com
      required: false
