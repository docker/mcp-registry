name: xquik
type: remote
meta:
  category: communication
  tags:
    - social-media
    - twitter
    - x
    - remote
    - api
about:
  title: Xquik
  description: Access X and Twitter search, extraction, monitoring, webhooks, and write workflows through a remote MCP server
  icon: https://xquik.com/logo-square.png
remote:
  transport_type: streamable-http
  url: https://xquik.com/mcp
  headers:
    Authorization: "Bearer ${XQUIK_API_KEY}"
config:
  description: Configure the connection to Xquik
  secrets:
    - name: xquik.api_key
      env: XQUIK_API_KEY
      example: <YOUR_API_KEY>
