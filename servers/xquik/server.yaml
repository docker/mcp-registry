name: xquik
type: remote
dynamic:
  tools: true
meta:
  category: social-media
  tags:
    - social-media
    - x
    - search
    - remote
about:
  title: Xquik
  description: Search X posts, inspect profiles, export followers, monitor keywords, and use Xquik API tools.
  icon: https://xquik.com/icon.svg
remote:
  transport_type: streamable-http
  url: https://xquik.com/mcp
  headers:
    Authorization: "Bearer ${XQUIK_API_KEY}"
config:
  secrets:
    - name: xquik.api_key
      env: XQUIK_API_KEY
      example: <YOUR_XQUIK_API_KEY>
