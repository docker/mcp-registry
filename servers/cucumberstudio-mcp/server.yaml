name: cucumberstudio-mcp
image: mcp/cucumberstudio-mcp
type: server
meta:
  category: devops
  tags:
    - cucumber
    - testing
    - bdd
    - automation
about:
  title: Cucumber Studio
  description: Access Cucumber Studio test scenarios, action words, test runs, and project information for BDD test management.
  icon: https://raw.githubusercontent.com/HeroSizy/cucumberstudio-mcp/master/assets/icon.png
source:
  project: https://github.com/HeroSizy/cucumberstudio-mcp
  branch: master
  commit: 9bbf651de3806c3c9b501f22a341144d6fc7ba3d
config:
  description: Configure the connection to Cucumber Studio API
  secrets:
    - name: cucumberstudio-mcp.access_token
      env: CUCUMBERSTUDIO_ACCESS_TOKEN
      example: <YOUR_ACCESS_TOKEN>
  env:
    - name: CUCUMBERSTUDIO_CLIENT_ID
      example: your_client_id
      value: "{{cucumberstudio-mcp.client_id}}"
    - name: CUCUMBERSTUDIO_UID
      example: your_user_id
      value: "{{cucumberstudio-mcp.uid}}"
  parameters:
    type: object
    properties:
      client_id:
        type: string
      uid:
        type: string
    required:
      - client_id
      - uid
