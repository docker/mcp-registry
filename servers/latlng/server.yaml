name: latlng
type: remote
dynamic:
  tools: true
meta:
  category: search
  tags:
    - geocoding
    - maps
    - places
    - openstreetmap
    - location
    - remote
about:
  title: LatLng
  description: Official LatLng MCP server for geocoding, reverse geocoding, places search, nearby POI lookup, and place categories.
  icon: https://www.latlng.work/favicon.png
remote:
  transport_type: streamable-http
  url: https://mcp.latlng.work/mcp
  headers:
    Authorization: "Bearer ${LATLNG_API_KEY}"
config:
  secrets:
    - name: latlng.api_key
      env: LATLNG_API_KEY
      example: <YOUR_LATLNG_SERVER_KEY>
