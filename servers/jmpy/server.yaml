name: jmpy
type: remote
meta:
  category: tools
  tags:
    - tools
    - url-shortener
    - qr-code
    - analytics
    - remote
about:
  title: Jmpy
  description: The ultimate Unified Link Management platform. Create branded short links, bulk URLs, dynamic QR codes, UTM parameters, password protection, and access deep click analytics.
  icon: https://www.google.com/s2/favicons?domain=jmpy.me&sz=64
remote:
  transport_type: sse
  url: https://jmpy.me/mcp/sse
  headers:
    x-mcp-key: "${JMPY_API_KEY}"
config:
  secrets:
    - name: jmpy.api_key
      env: JMPY_API_KEY
      example: <YOUR_API_KEY>
