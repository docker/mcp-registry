name: citation-intelligence
image: mcp/citation-intelligence
type: server
meta:
  category: research
  tags:
    - research
    - seo
    - ai-search
    - citation
about:
  title: Citation Intelligence
  description: What LLMs cite, for agents. Check which URLs Perplexity, Claude, ChatGPT, Gemini, Bing, and Google AI Overviews cite for any query. Track AI citation gaps, audit your site's AI visibility, and surface citation evidence across major LLM-powered search engines.
  icon: https://avatars.githubusercontent.com/u/284312388?v=4
source:
  project: https://github.com/AutomateLab-tech/citation-intelligence
  commit: a67ea74fbd2d4d6c5bca716ddefa03c2cfd27568
config:
  description: Configure API keys for LLM search providers
  secrets:
    - name: citation-intelligence.perplexity_api_key
      env: PERPLEXITY_API_KEY
      example: pplx-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    - name: citation-intelligence.google_api_key
      env: GOOGLE_API_KEY
      example: AIzaXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
    - name: citation-intelligence.google_cx
      env: GOOGLE_CX
      example: 012345678901234567890:xxxxxxxxxxxxxxx
    - name: citation-intelligence.openai_api_key
      env: OPENAI_API_KEY
      example: sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    - name: citation-intelligence.anthropic_api_key
      env: ANTHROPIC_API_KEY
      example: sk-ant-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    - name: citation-intelligence.gemini_api_key
      env: GEMINI_API_KEY
      example: AIzaXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
    - name: citation-intelligence.bing_api_key
      env: BING_API_KEY
      example: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
