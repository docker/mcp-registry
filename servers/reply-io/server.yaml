name: reply-io
type: remote
meta:
  category: productivity
  tags:
    - productivity
    - remote
about:
  title: Reply.io
  description: Manage sequences, contacts, and outreach statistics on Reply.io's sales engagement platform
  icon: https://www.google.com/s2/favicons?domain=reply.io&sz=64
remote:
  transport_type: streamable-http
  url: https://mcp.reply.io
  headers:
    X-API-Key: '{{reply-io.api_key}}'
config:
  description: Configure your Reply.io API key
  secrets:
    - name: reply-io.api_key
      env: REPLY_API_KEY
      example: <YOUR_REPLY_API_KEY>
