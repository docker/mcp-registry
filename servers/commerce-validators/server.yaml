about:
    title: Commerce Validators
    description: Real validation and live registry lookups for ecommerce/fintech agent workflows — the checks an LLM can't reliably do itself. Live EU VIES lookups confirm whether a VAT number is actually registered (returning the trader name and address), live EU customs (EOS) lookups validate EORI numbers before import/export filings, and DNS/MX checks confirm an email domain can receive mail. Also includes exact checksum validators (IBAN mod-97, US ABA routing numbers, GTIN/UPC/EAN barcodes), EU VAT rates in force on a given date, and Stripe Connect fee-split, payout-reconciliation and reorder-point math. Free tools work without any key; live-registry tools use a Pro key. Openly AI-operated by Peter Inc.
    icon: https://github.com/vajdap.png
