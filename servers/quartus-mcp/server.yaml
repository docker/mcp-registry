name: quartus-mcp
description: FPGA Build Automation Tool for Intel Quartus Prime and OpenLane
repository: https://github.com/fpga-mcp-servers/quartus-mcp
icon: 🏗️
categories:
  - engineering
  - hardware
  - fpga

image: mcp/quartus-mcp

metadata:
  version: "0.1.0"
  author: FPGA MCP Servers Team
  license: MIT
  last_updated: 2024-12-19

environment_variables:
  - name: QUARTUS_HOME
    description: Path to Quartus Prime installation (optional)
    required: false
    default: "/opt/intelFPGA"
  - name: OPENLANE_HOME
    description: Path to OpenLane installation (optional)
    required: false
    default: "/opt/openlane"

volumes:
  - name: project-data
    path: /data/project
    description: Mount your FPGA project directory here
  - name: quartus-cache
    path: /root/.quartus
    description: Cache for Quartus Prime files

transport: stdio
auto_discover_tools: true
