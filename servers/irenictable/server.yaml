name: irenictable
type: remote

dynamic:
  tools: true

meta:
  category: productivity
  tags:
    - productivity
    - whiteboard
    - collaboration
    - nonprofit
    - diagramming
    - remote

about:
  title: IrenicTable
  description: >-
    Collaborative digital whiteboard for non-profit organizations.
    Create boards, sticky notes, shapes, connectors, C4 architecture
    diagrams, and mind maps — all via MCP. Real-time sync powered by
    Yjs CRDTs.
  icon: https://irenictable.benevolabs.org/favicon-64.png

remote:
  transport_type: streamable-http
  url: https://irenictable.benevolabs.org/mcp

oauth:
  - provider: irenictable
    secret: irenictable.oauth_token
    env: IRENICTABLE_OAUTH_TOKEN
