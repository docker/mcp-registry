name: waiaas
image: waiaas/daemon
type: server
meta:
  category: blockchain
  tags:
    - blockchain
    - crypto
    - wallet
    - defi
    - ai-agent
    - multi-chain
about:
  title: WAIaaS
  description: Self-hosted wallet daemon for AI agents with 60+ MCP tools for multi-chain crypto operations including transfers, DeFi, NFTs, and smart contracts across EVM and Solana networks.
  icon: https://www.google.com/s2/favicons?domain=github.com/minhoyoo-iotrust/WAIaaS&sz=64
source:
  project: https://github.com/minhoyoo-iotrust/WAIaaS
  commit: f9d12d955baf47cdffc9be3bb5b65391626f7e3e
run:
  env:
    WAIAAS_DATA_DIR: /data
    WAIAAS_DAEMON_HOSTNAME: "0.0.0.0"
  volumes:
    - source: waiaas-data
      target: /data
  ports:
    - 3100:3100
config:
  description: Configure the WAIaaS daemon for AI agent wallet operations
  secrets:
    - name: waiaas.master_password
      env: WAIAAS_AUTH_MASTER_PASSWORD
      example: <YOUR_MASTER_PASSWORD>
