name: didit
type: remote
dynamic:
  tools: true
meta:
  category: security
  tags:
    - identity-verification
    - kyc
    - kyb
    - aml
    - fraud
    - compliance
    - biometrics
    - transaction-monitoring
    - remote
about:
  title: Didit MCP Server
  description: Identity and fraud infrastructure for AI agents. Run KYC, KYB, AML, biometrics, workflows, transaction monitoring, lists, cases, reports, webhooks, billing, and workspace operations through Didit.
  icon: https://raw.githubusercontent.com/didit-protocol/mcp/main/assets/didit-mcp-icon-400.png
remote:
  transport_type: streamable-http
  url: https://mcp.didit.me/mcp
oauth:
  - provider: didit
    secret: didit.personal_access_token
    env: DIDIT_PERSONAL_ACCESS_TOKEN
