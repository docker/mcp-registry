name: microservices-sh
type: remote
meta:
  category: devops
  tags:
    - devops
    - cloudflare
    - agents
    - remote
about:
  title: Microservices.sh
  description: Build and deploy verified Cloudflare-native business apps with agent guardrails.
  icon: https://avatars.githubusercontent.com/u/293387706?s=200&v=4
remote:
  transport_type: streamable-http
  url: https://api.microservices.sh/mcp
  headers:
    Authorization: "Bearer ${MICROSERVICES_API_KEY}"
config:
  secrets:
    - name: microservices-sh.api_key
      env: MICROSERVICES_API_KEY
      example: <YOUR_API_KEY>
