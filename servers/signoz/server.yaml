name: signoz
image: mcp/signoz
type: server
meta:
  category: monitoring
  tags:
    - signoz
    - observability
    - monitoring
about:
  title: SigNoz
  icon: https://www.google.com/s2/favicons?domain=signoz.io&sz=64
source:
  project: https://github.com/SigNoz/signoz-mcp-server
  commit: 71d26ed1947f4b549fb19534e0b950252a573896
config:
  description: Configure the connection to SigNoz
  secrets:
    - name: signoz.api_key
      env: SIGNOZ_API_KEY
      example: <your api key>
  env:
    - name: SIGNOZ_URL
      example: https://your-instance.signoz.cloud
      value: "{{signoz.url}}"
  parameters:
    type: object
    properties:
      url:
        type: string
        title: SigNoz URL
        description: URL to your SigNoz instance (e.g. https://your-instance.signoz.cloud)
    required:
      - url
