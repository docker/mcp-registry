name: inflow
type: remote
dynamic:
  tools: true
meta:
  category: payments
  tags:
    - payments
    - finance
    - transactions
    - blockchain
    - remote
about:
  title: InFlow
  description: Connect to InFlow to register, access, and pay for services directly within your AI workflow. Keep onboarding, authorization, and payments for paid services in-context and in-line so your workflows never stop.
  icon: https://www.google.com/s2/favicons?domain=inflowpay.ai&sz=64
remote:
  transport_type: streamable-http
  url: https://app.inflowpay.ai/mcp
oauth:
  - provider: inflow
    secret: inflow.access_token
    env: INFLOW_ACCESS_TOKEN
