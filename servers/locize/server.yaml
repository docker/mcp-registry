name: locize
type: remote
dynamic:
  tools: true
meta:
  category: productivity
  tags:
    - localization
    - translation
    - i18n
    - i18next
    - remote
about:
  title: Locize
  description: Translation management for the i18next ecosystem. Read and write translations, search translation memory, fetch glossary, styleguide and screenshot context, publish versions, and manage branches and languages.
  icon: https://www.locize.com/img/logo512.png
remote:
  transport_type: streamable-http
  url: https://mcp.locize.app
oauth:
  - provider: locize
    secret: locize.personal_access_token
    env: LOCIZE_PAT
