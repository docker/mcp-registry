name: zephyr-scale
image: mcp/zephyr-scale
type: server

meta:
  category: testing
  tags:
    - zephyr
    - jira
    - test-management
    - qa
    - atlassian
    - test-cases
    - quality-assurance

about:
  title: Zephyr Scale
  description: >
    AI-powered test management assistant for Zephyr Scale Cloud. Helps Product
    Managers, QA Leads, and Engineers find test cases by scenario, drill into
    folder hierarchies, track release coverage, and review execution stats —
    all through natural language.
  icon: https://www.smartbear.com/favicon.ico

source:
  project: https://github.com/john-thoma/zephyr-mcp
  commit: main

config:
  description: >
    Provide your Zephyr Scale Cloud API token. Generate one at:
    Jira → Apps → Zephyr Scale → API Access Tokens.
    Optionally set JIRA_BASE_URL to enable clickable links in results.
  secrets:
    - name: zephyr.api_token
      env: ZEPHYR_API_TOKEN
      example: <YOUR_ZEPHYR_SCALE_API_TOKEN>
  env:
    - name: JIRA_BASE_URL
      example: https://yourcompany.atlassian.net
      value: "{{zephyr.jira_base_url}}"
  parameters:
    type: object
    properties:
      jira_base_url:
        type: string
