about:
  title: Alfresco
  description: A minimal Model Context Protocol (MCP) server for Alfresco providing tools via the Alfresco REST API
  icon: https://avatars.githubusercontent.com/u/391127?v=4
source:
  project: https://github.com/AlfrescoLabs/alfresco-mcp-server
  commit: 141731818b6b40aae4ccc7ca8fccaf0c5800769f
config:
  description: Configure the connection to Alfresco
  env:
    - name: ALFRESCO_HOST
      example: http://localhost:8080
      value: "{{alfresco.alfresco_host}}"
  parameters:
    type: object
    properties:
      alfresco_host:
        type: string
    required:
      - alfresco_host
