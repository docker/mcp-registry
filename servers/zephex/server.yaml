name: zephex
type: remote
dynamic:
  tools: true
meta:
  category: developer-tools
  tags:
    - developer-tools
    - code-analysis
    - project-context
    - package-audit
    - remote
about:
  title: Zephex
  description: >-
    MCP gateway for AI code editors. 10 built-in tools for project context,
    package intelligence, code search, URL inspection, and security audits.
    Works with Cursor, Claude Code, VS Code, Windsurf, Cline, Kiro, Codex,
    and 6 more editors. One API key, all tools. Free to start at zephex.dev.
  icon: https://zephex.dev/zephex-icon.svg
remote:
  transport_type: streamable-http
  url: https://zephex.dev/mcp
  headers:
    Authorization: "Bearer ${ZEPHEX_API_KEY}"
config:
  description: Your Zephex API key from zephex.dev/dashboard
  secrets:
    - name: zephex.api_key
      env: ZEPHEX_API_KEY
      example:
