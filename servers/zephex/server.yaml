name: zephex
type: remote
dynamic:
  tools: true
meta:
  category: developer-tools
  tags:
    - developer-tools
    - code-analysis
    - project-context
    - package-audit
    - remote
about:
  title: Zephex
  description: >-
    MCP gateway for AI code editors. 10 built-in tools for project context,
    package intelligence, code search, URL inspection, and security audits.
    Works with Cursor, Claude Code, VS Code, Windsurf, Cline, Kiro, Codex,
    and 6 more editors. One API key, all tools. Free to start at zephex.dev.
  icon: https://zephex.dev/favicon.ico
remote:
  transport_type: streamable-http
  url: https://zephex.dev/mcp
  headers:
    Authorization: "Bearer ${ZEPHEX_API_KEY}"
config:
  description: Your Zephex API key from zephex.dev/dashboard
  secrets:
    - name: zephex.api_key
      env: ZEPHEX_API_KEY
      example: YOUR_ZEPHEX_API_KEY
tools:
  - name: get_project_context
    description: >-
      Detects language, framework, package manager, runtime version,
      build/test/dev commands, API routes, env vars, and entry points from a
      project context or a public repository.
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Project location
        detail_level:
          type: string
          description: "Output tier: brief, standard, or full"
      required:
        - path
  - name: read_code
    description: >-
      AST-based surgical code extraction. Returns the signature, body, and
      optional usages of a specific function, class, method, or type.
    parameters:
      type: object
      properties:
        target:
          type: string
          description: Symbol name to find (function, class, method, or type)
        path:
          type: string
          description: Project location
        detail_level:
          type: string
          description: "signature, body, or context"
      required:
        - target
  - name: find_code
    description: >-
      BM25-ranked code search with full enclosing function/class context.
      Supports literal, regex, and boolean (AND/OR/NOT) queries.
    parameters:
      type: object
      properties:
        query:
          type: string
          description: Text, regex, or boolean expression to search for
        path:
          type: string
          description: Project location
        scope:
          type: string
          description: "all, definitions, usages, tests, config, imports, or comments"
      required:
        - query
  - name: check_package
    description: >-
      Live registry lookup for any package. Returns version status,
      supply-chain attack signals, typosquat risk, weekly downloads, license,
      and deprecation status. Supports npm, pypi, cargo, gem, go, maven,
      nuget, packagist, pub, hex, cocoapods, and spm.
    parameters:
      type: object
      properties:
        package:
          type: string
          description: Package name to check
        ecosystem:
          type: string
          description: "Registry: npm, pypi, cargo, gem, go, maven, nuget, etc."
        version:
          type: string
          description: Installed version (auto-detected from lockfile if omitted)
      required:
        - package
  - name: audit_package
    description: >-
      Deep package intelligence. Returns breaking changes across versions,
      CVE list with CVSS scores, official migration steps, real code diff
      examples, deprecated API surface, and peer-dependency conflicts.
    parameters:
      type: object
      properties:
        package:
          type: string
          description: Package name to audit
        task:
          type: string
          description: "upgrade, migrate, security, or debug"
        from_version:
          type: string
          description: Current version
      required:
        - package
  - name: explain_architecture
    description: >-
      End-to-end architecture analysis with Mermaid diagrams. Detects entry
      points, auth flow, data flow, service boundaries, external services,
      dependency graph, and architectural anti-patterns.
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Project location
        focus:
          type: string
          description: "auth, api, database, billing, data_flow, error_handling, or full"
        mode:
          type: string
          description: "overview, deep, or audit"
      required:
        - path
  - name: Zephex_dev_info
    description: >-
      Expert developer knowledge base. Answers questions about database
      schemas, mobile pre-deploy checklists, frontend patterns, security
      reviews, auth setups, and architecture blueprints.
    parameters:
      type: object
      properties:
        query:
          type: string
          description: What you want to know in plain language
        category:
          type: string
          description: "databases, mobile, frontend, security, architecture, or auth"
      required:
        - query
  - name: scope_task
    description: >-
      AST-based task scoping. Returns the minimal focus file set, reusable
      utilities, callers-at-risk, and risk assessment for a development task.
    parameters:
      type: object
      properties:
        task:
          type: string
          description: Plain English task description
        path:
          type: string
          description: Project location
        max_files:
          type: integer
          description: "Max files to return (default: 7)"
      required:
        - task
  - name: audit_headers
    description: >-
      Wire-level audit of a deployed endpoint. Grades security headers,
      SSL/TLS certificate, redirect chain, and cookies. Returns an A+ to F
      grade with copy-paste fix snippets for Nginx, Vercel, Cloudflare, and
      more.
    parameters:
      type: object
      properties:
        url:
          type: string
          description: The https:// URL to audit
        check_headers:
          type: boolean
          description: Grade all security headers
        check_ssl:
          type: boolean
          description: Check SSL certificate validity
      required:
        - url
  - name: thinking
    description: >-
      Persistent reasoning session for hard problems. Tracks hypotheses,
      observations, plans, revisions, and conclusions across tool calls.
      Prevents circular debugging and lost context in long sessions.
    parameters:
      type: object
      properties:
        thought:
          type: string
          description: The reasoning content for this step
        thoughtNumber:
          type: integer
          description: Which thought this is (1-based)
        thoughtType:
          type: string
          description: "hypothesis, observation, plan, revision, conclusion, question, or debug"
      required:
        - thought
        - thoughtNumber
        - thoughtType
