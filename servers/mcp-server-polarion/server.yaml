about:
  title: Polarion ALM
  description: Read and write Siemens Polarion ALM from your AI assistant — documents, work items, requirements, test cases, comments, and traceability links.
  icon: https://raw.githubusercontent.com/devemberx/mcp-server-polarion/main/.github/assets/icon.png
source:
  project: https://github.com/devemberx/mcp-server-polarion
  commit: bb2b28be444fcc87a35eeddcfcce5d02ddb8e376
config:
  description: Configure the connection to your Polarion ALM server.
  secrets:
    - name: mcp-server-polarion.polarion_token
      env: POLARION_TOKEN
      example: <POLARION_TOKEN>
  env:
    - name: POLARION_URL
      example: https://polarion.example.com
      value: "{{mcp-server-polarion.polarion_url}}"
  parameters:
    type: object
    properties:
      polarion_url:
        type: string
        description: Base URL of your Polarion ALM server, no trailing slash (e.g. https://polarion.example.com).
    required:
      - polarion_url
