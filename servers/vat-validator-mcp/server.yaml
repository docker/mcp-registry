remote:
  transport:
    type: streamable-http
    url: https://vat-validator-mcp-production.up.railway.app/mcp
config:
  secrets:
    - name: vat-validator-mcp.api_key
      env: X_API_KEY
      example: your_api_key_from_kordagencies.com
      required: false
