name: routara
type: remote
meta:
  category: ai
  tags:
    - ai
    - llm
    - image-generation
    - video-generation
    - api-gateway
    - remote
about:
  title: Routara LLM Gateway
  description: Access 787+ chat, image, and video models through one OpenAI-compatible Routara MCP gateway.
  icon: https://raw.githubusercontent.com/36412749-collab/routara-mcp/main/logo-400.png
remote:
  transport_type: streamable-http
  url: https://api.routara.ai/mcp
  headers:
    x-routara-api-key: "${ROUTARA_API_KEY}"
config:
  description: Provide a Routara API key from https://routara.ai/account.
  secrets:
    - name: routara.api_key
      env: ROUTARA_API_KEY
      example: <YOUR_API_KEY>
