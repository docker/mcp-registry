name: gitlab-mcp-server
image: mcp/gitlab-mcp-server
type: server
meta:
  category: devops
  tags:
    - gitlab
    - devops
    - ci-cd
    - source-control
about:
  title: GitLab
  description: Comprehensive GitLab MCP server covering REST API v4 and GraphQL
    with automatic edition gating — ~847 tools on Free/CE, ~999 on Premium, up
    to ~1071 on Ultimate. Three tool surfaces (consolidated meta-tools, default
    here; a low-token dynamic find/execute pair; one tool per action), plus 45
    MCP resources, 37 prompts, argument completions, progress and elicitation.
    Supports GitLab.com and self-managed instances, read-only and safe modes.
  icon: https://raw.githubusercontent.com/jmrplens/gitlab-mcp-server/main/site/public/logo-400.png
source:
  project: https://github.com/jmrplens/gitlab-mcp-server
  commit: c7990f9ac96c552d5111ceef5022c0449024da3e
run:
  allowHosts:
    - "*:443"
config:
  description: Configure your GitLab instance URL and Personal Access Token.
    Optionally force a licensing tier with GITLAB_TIER, disable mutating tools
    with GITLAB_READ_ONLY, preview mutations as JSON with GITLAB_SAFE_MODE, or
    switch the tool surface with TOOL_SURFACE.
  secrets:
    - name: gitlab-mcp-server.gitlab_token
      env: GITLAB_TOKEN
      example: glpat-xxxxxxxxxxxxxxxxxxxx
  env:
    - name: GITLAB_URL
      example: https://gitlab.com
      value: "{{gitlab-mcp-server.gitlab_url}}"
    - name: TOOL_SURFACE
      example: meta
      value: "{{gitlab-mcp-server.tool_surface}}"
    - name: GITLAB_TIER
      example: ultimate
      value: "{{gitlab-mcp-server.gitlab_tier}}"
    - name: GITLAB_READ_ONLY
      example: "false"
      value: "{{gitlab-mcp-server.gitlab_read_only}}"
    - name: GITLAB_SAFE_MODE
      example: "false"
      value: "{{gitlab-mcp-server.gitlab_safe_mode}}"
    - name: AUTO_UPDATE
      value: "false"
  parameters:
    type: object
    properties:
      gitlab_url:
        type: string
        description:
          GitLab instance URL (use https://gitlab.com for SaaS, or your
          self-hosted URL).
        default: https://gitlab.com
      tool_surface:
        type: string
        description: Tool catalog surface — "meta" (consolidated domain tools,
          recommended in Docker MCP Toolkit), "dynamic" (two find/execute
          tools, lowest token use) or "individual" (one tool per action).
        default: meta
      gitlab_tier:
        type: string
        description:
          Force the licensing tier ("free", "premium" or "ultimate") and skip
          license detection. Leave empty to auto-detect the tier from the
          instance license.
        default: ""
      gitlab_read_only:
        type: string
        description:
          Disable every mutating tool (safe for read-only chats). Set to
          "true" to enable.
        default: "false"
      gitlab_safe_mode:
        type: string
        description:
          Intercept mutating tools and return a JSON preview instead of
          executing the call. Set to "true" to enable.
        default: "false"
    required:
      - gitlab_url
