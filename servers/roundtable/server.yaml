name: roundtable
type: remote
dynamic:
  tools: true
meta:
  category: ai
  tags:
    - ai
    - multi-model
    - reasoning
    - collaboration
    - remote
about:
  title: Roundtable
  description: Multi-model AI debates — GPT-4o, Claude, Gemini & 200+ models discuss your question, then a moderator synthesizes all perspectives into actionable insight.
  icon: https://www.google.com/s2/favicons?domain=roundtable.now&sz=64
remote:
  transport_type: streamable-http
  url: https://mcp.roundtable.now/mcp
  headers:
    X-API-Key: "${ROUNDTABLE_API_KEY}"
config:
  secrets:
    - name: roundtable.api_key
      env: ROUNDTABLE_API_KEY
      example: <YOUR_API_KEY>
