name: flowstudio-mcp
type: remote
meta:
  category: automation
  tags:
    - power-automate
    - power-platform
    - microsoft
    - cloud-flows
    - automation
    - remote
about:
  title: Flow Studio - Power Automate MCP
  description: Debug, build, and manage Microsoft Power Automate cloud flows with AI agents. Get action-level error details, build flows from natural language, and operate across tenants.
  icon: https://www.google.com/s2/favicons?domain=flowstudio.app&sz=64
remote:
  transport_type: streamable-http
  url: https://mcp.flowstudio.app/mcp
  headers:
    x-api-key: "${FLOWSTUDIO_MCP_API_KEY}"
config:
  description: "Get your API key at https://mcp.flowstudio.app"
  secrets:
    - name: flowstudio-mcp.api_key
      env: FLOWSTUDIO_MCP_API_KEY
      example: <YOUR_API_KEY>
source:
  project: https://github.com/ninihen1/power-automate-mcp-skills
