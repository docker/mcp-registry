name: flowstudio-mcp
type: remote
dynamic:
  tools: true
meta:
  category: automation
  tags:
    - power-automate
    - power-platform
    - microsoft
    - automation
    - debugging
    - remote
about:
  title: Flow Studio Power Automate
  description: Debug, build, and operate Power Automate cloud flows with AI agents. Exposes action-level inputs, outputs, loop iterations, and nested child flow failures that the Graph API cannot access.
  icon: https://www.google.com/s2/favicons?domain=flowstudio.app&sz=64
remote:
  transport_type: streamable-http
  url: https://mcp.flowstudio.app/mcp
  headers:
    x-api-key: "${FLOWSTUDIO_API_KEY}"
config:
  secrets:
    - name: flowstudio-mcp.api_key
      env: FLOWSTUDIO_API_KEY
      example: <YOUR_API_KEY>
