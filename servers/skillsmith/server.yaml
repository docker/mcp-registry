name: skillsmith
image: mcp/skillsmith
type: server
meta:
  category: productivity
  tags:
    - agent-skills
    - claude
    - skills
    - discovery
about:
  title: Skillsmith
  description: Discover, install, compare, and manage Claude Agent Skills — search a skill registry, get contextual recommendations, and validate skill structure.
  icon: https://www.skillsmith.app/logo-icon.svg
source:
  project: https://github.com/smith-horn/skillsmith
  branch: main
  # @skillsmith/core@0.11.0 published 2026-07-09 (PR #1787) with the
  # DEFAULT_RISK_THRESHOLD export mcp-server needs at startup; this commit
  # is the PR's squash-merge, so it carries both that export AND the
  # packages/mcp-server/Dockerfile (added in #1769 at 847558d6). Verified:
  # mcp-server/package.json here pins "@skillsmith/core": "^0.11.0".
  commit: 4000c0b78b5ba022af40be84e9200a6fce5652ee
  directory: packages/mcp-server
run:
  volumes:
    - '{{skillsmith.skills_path}}:/home/nodejs/.claude/skills'
    - '{{skillsmith.config_path}}:/home/nodejs/.skillsmith'
config:
  description: Optional API key for higher quotas (works with no key — 10 free calls covering search/get_skill; some tools like skill_audit require a paid Team+ tier regardless of key). Mount your local Claude skills directory (skills_path) so install/uninstall persist to your real skills folder — without it, installs appear to succeed but write only to the container's throwaway filesystem and are lost on restart.
  secrets:
    - name: skillsmith.api_key
      env: SKILLSMITH_API_KEY
      example: sk_live_your_key
  parameters:
    type: object
    properties:
      skills_path:
        type: string
        default: ~/.claude/skills
      config_path:
        type: string
        default: ~/.skillsmith
