name: pgedge-postgres-mcp
image: mcp/pgedge-postgres-mcp
type: server
meta:
  category: database
  tags:
    - postgresql
    - database
    - sql
    - vector-search
    - hybrid-search
about:
  title: PgEdge Postgres
  description: Enterprise-grade PostgreSQL integration with natural language queries, hybrid search (pgvector + BM25), and Docker deployment. Works with PostgreSQL 14+ and all major cloud providers.
  icon: https://www.google.com/s2/favicons?domain=pgedge.com&sz=64
source:
  project: https://github.com/pgEdge/pgedge-postgres-mcp
  commit: 56eed82349428146c0ceb03f837546e087327645
  dockerfile: Dockerfile.server
run:
  env:
    DATABASE_URL: $DATABASE_URL
config:
  description: Configure the connection to pgEdge Postgres
  secrets:
    - name: pgedge-postgres-mcp.database_url
      env: DATABASE_URL
      example: postgresql://user:pass@host.docker.internal:5432/mydb
