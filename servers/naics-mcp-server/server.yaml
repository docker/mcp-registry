about:
  title: NAICS 2022 Classification
  description: |
    Self-contained NAICS 2022 industry classification service with semantic search, hierarchy browsing, and cross-reference checking.

    Features:
    - Hybrid semantic/lexical search over 2,125 NAICS codes
    - Full 5-level hierarchy browsal (Sector to National Industry)
    - 20,398 official index terms
    - Cross-reference checking for classification exclusions/inclusions
    - Classification workbook for recording decisions
    - Batch classification support

    Fully self-contained: no API keys, no external services, no runtime downloads. Includes embedded DuckDB database and sentence-transformers model for local inference.
  icon: https://avatars.githubusercontent.com/u/182288589?s=200&v=4
source:
  project: https://github.com/mfbaig35r/naics-mcp-server
  branch: main
  commit: 154e8b2b724feebe30db4344ba5351bfdce869d4
config:
  description: Configure the NAICS MCP Server (no configuration required for basic usage)
  env:
    - name: NAICS_LOG_LEVEL
      example: INFO
      value: "{{naics-mcp-server.log_level}}"
  parameters:
    type: object
    properties:
      log_level:
        type: string
        description: "Logging level: DEBUG, INFO, WARNING, or ERROR"
        default: INFO
