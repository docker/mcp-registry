name: transloadit-mcp-server
image: mcp/transloadit-mcp-server
type: server
meta:
  category: media
  tags:
    - media
    - video
    - image
    - audio
    - document
about:
  title: Transloadit
  description: Process video, audio, images, and documents with 86+ cloud media processing robots. Encode video to HLS, resize images, transcribe speech, OCR documents, and more.
  icon: https://transloadit.com/assets/images/square-ogimage.png
source:
  project: https://github.com/transloadit/node-sdk
  commit: e99773a88f05f09a9893b7ae4ff9b110ce422af5
  directory: packages/mcp-server
run:
  allowHosts:
    - api2.transloadit.com:443
    - api2-us-east-1.transloadit.com:443
    - api2-eu-west-1.transloadit.com:443
    - api2-ap-southeast-1.transloadit.com:443
config:
  description: Configure Transloadit API credentials
  secrets:
    - name: transloadit.auth_key
      env: TRANSLOADIT_KEY
      example: your_auth_key
      description: Your Transloadit Auth Key from https://transloadit.com/c/template-credentials/
    - name: transloadit.auth_secret
      env: TRANSLOADIT_SECRET
      example: your_auth_secret
      description: Your Transloadit Auth Secret from https://transloadit.com/c/template-credentials/
