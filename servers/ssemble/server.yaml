name: ssemble
type: remote
dynamic:
  tools: true
meta:
  category: media
  tags:
    - media
    - video
    - content-creation
    - youtube
    - shorts
    - remote
about:
  title: Ssemble AI Clipping
  description: Create AI-generated short-form video clips from YouTube with captions, music, gameplay overlays, meme hooks, and viral scoring
  icon: https://www.google.com/s2/favicons?domain=ssemble.com&sz=64
remote:
  transport_type: streamable-http
  url: https://mcp.ssemble.com/mcp
  headers:
    x-api-key: "${SSEMBLE_API_KEY}"
config:
  secrets:
    - name: ssemble.api_key
      env: SSEMBLE_API_KEY
      example: <YOUR_API_KEY>
      description: Get your API key from https://app.ssemble.com
