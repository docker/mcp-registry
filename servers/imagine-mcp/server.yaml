name: imagine-mcp
image: mcp/imagine-mcp
type: server
meta:
  category: ai
  tags:
    - image-generation
    - video
    - ai
about:
  title: Imagine
  description: Image and video understanding and generation for AI agents across multiple model providers. Composite tools for generation, editing, and visual analysis.
  icon: https://avatars.githubusercontent.com/u/135627235?v=4
source:
  project: https://github.com/n24q02m/imagine-mcp
  commit: f1a918f5b4f265bbd7c37bf8663218f99ec79ec1
config:
  description: Configure at least one image/video model provider API key
  secrets:
    - name: imagine-mcp.gemini_api_key
      env: GEMINI_API_KEY
      example: <GEMINI_API_KEY>
    - name: imagine-mcp.openai_api_key
      env: OPENAI_API_KEY
      example: <OPENAI_API_KEY>
    - name: imagine-mcp.xai_api_key
      env: XAI_API_KEY
      example: <XAI_API_KEY>
