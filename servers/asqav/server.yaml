about:
  title: Asqav
  description: >-
    Stop a rogue AI agent before it acts, and prove what it tried. Asqav
    checks each action against your organization's policies before it runs.
    A blocked action is rejected with a signed record of the attempt, an
    allowed action proceeds and is signed into a verifiable audit trail.
    Tools cover policy checks, pre-execution gating with bilateral receipts,
    signature and output verification, agent management, and a scanner that
    inspects MCP tool definitions for threats such as prompt injection and
    hidden unicode. Works on the free tier of the Asqav API.
  icon: https://avatars.githubusercontent.com/u/32335502?v=4
