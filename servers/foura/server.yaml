  branch: main
  commit: 382241b6e0f6b069a12e8aa7e5ff95218bdb0f67
  dockerfile: Dockerfile.stdio
config:
  description: Configure your FourA API access
  secrets:
    - name: foura.api_key
      env: FOURA_API_KEY
      example: pk_live_xxxxxxxxxxxxxxxxxxxxxxxx
