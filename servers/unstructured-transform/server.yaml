about:
  title: Unstructured Transform
  description: Turn unstructured files into AI-ready data. The Unstructured Transform MCP server ingests PDFs, Word, PowerPoint, images, HTML, emails, and 70+ other file types, then partitions, applies OCR, extracts tables and images, enriches, chunks, and embeds the content. It outputs structured data ready to load into vector databases and power RAG and agentic AI pipelines.
  icon: https://avatars.githubusercontent.com/u/108372208?s=200&v=4
remote:
  transport_type: streamable-http
  url: https://mcp.transform.unstructured.io
oauth:
  - provider: unstructured-transform
    secret: unstructured-transform.personal_access_token
    env: UNSTRUCTURED_TRANSFORM_PERSONAL_ACCESS_TOKEN
