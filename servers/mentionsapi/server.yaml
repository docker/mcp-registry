name: mentionsapi
type: remote
meta:
  category: search
  tags:
    - brand-monitoring
    - seo
    - search
    - marketing
    - remote
about:
  title: MentionsAPI
  description: Track brand mentions, ranks and citations across AI search surfaces - ChatGPT, Claude, Gemini, Perplexity, Google AI Overviews, AI Mode, and Bing Copilot.
  icon: https://www.google.com/s2/favicons?domain=mentionsapi.com&sz=64
remote:
  transport_type: streamable-http
  url: https://api.mentionsapi.com/mcp
  headers:
    Authorization: "Bearer ${MENTIONSAPI_KEY}"
config:
  secrets:
    - name: mentionsapi.api_key
      env: MENTIONSAPI_KEY
      example: lvk_live_xxxxxxxxxxxx
