  icon: https://www.google.com/s2/favicons?domain=kordagencies.com&sz=64
remote:
  transport:
    type: streamable-http
    url: https://local-model-suitability-mcp-production.up.railway.app/mcp
config:
  secrets:
    - name: local-model-suitability-mcp.api_key
      env: X_API_KEY
      example: your_api_key_from_kordagencies.com
      required: false
