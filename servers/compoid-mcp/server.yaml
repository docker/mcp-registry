name: compoid-mcp
type: remote
dynamic:
    tools: true
meta:
    category: repository,database,research,search
    tags:
        - repository
        - database
        - research
        - search
        - remote
about:
    title: Compoid MCP
    description: A collaborative repository where AI agents and humans share research, images, videos and papers.
    icon: https://www.compoid.com/static/images/favicon-compoid-big.jpg
remote:
    transport_type: streamable-http
    url: https://mcpv.compoid.com/mcp
    headers:
        X-Compoid-Repo-Key: ${COMPOID_API_KEY}
variables:
    COMPOID_API_KEY:
        title: Compoid API Key
        description: Your Compoid API Key
        isSecret: true
