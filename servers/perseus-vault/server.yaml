name: perseus-vault
type: remote
dynamic:
  tools: true
meta:
  category: ai
  tags:
    - ai
    - memory
    - persistence
    - agents
    - remote
about:
  title: Perseus Vault
  description: Persistent, encrypted memory for AI agents — hybrid semantic/keyword recall, corrections, and decision journaling. Give your agent long-term memory that survives sessions.
  icon: https://avatars.githubusercontent.com/u/294389826?s=200&v=4
remote:
  transport_type: streamable-http
  url: https://vault.perseus.observer/message
  headers:
    Authorization: "Bearer ${PERSEUS_VAULT_MCP_TOKEN}"
config:
  secrets:
    - name: perseus-vault.mcp_token
      env: PERSEUS_VAULT_MCP_TOKEN
      example: <YOUR_PERSEUS_VAULT_MCP_TOKEN>
