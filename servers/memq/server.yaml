name: memq
type: remote
meta:
  category: ai
  tags:
    - ai
    - memory
    - mcp
    - agents
    - knowledge-base
    - remote
about:
  title: Multinex MemQ
  description: Persistent memory infrastructure for AI agents. Connect Docker Desktop MCP clients to hosted MemQ for durable recall, Soul Journal reflection, namespace-aware search, and team context continuity.
  icon: https://multinex.ai/brand/memq-product-brand.svg
remote:
  transport_type: streamable-http
  url: https://mcp.multinex.ai/mcp/v1
  headers:
    Authorization: "Bearer ${MEMQ_API_KEY}"
config:
  secrets:
    - name: memq.api_key
      env: MEMQ_API_KEY
      example: <YOUR_MEMQ_API_KEY>
      description: Create a MemQ API key after signup or checkout at https://billing.multinex.ai/signup?product=memq.
      required: true
