  headers:
    Authorization: "Bearer ${MEMQ_API_KEY}"
config:
  secrets:
    - name: memq.api_key
      env: MEMQ_API_KEY
      example: <YOUR_MEMQ_API_KEY>
      description: Create a MemQ API key from the Multinex billing dashboard.
