name: convertapi-mcp
type: remote
dynamic:
    tools: true
meta:
    category: document management
    tags:
        - document management
        - remote
about:
    title: ConvertAPI MCP
    description: "ConvertAPI MCP provides a powerful document conversion service through the Model Context Protocol (MCP), enabling AI agents and applications to seamlessly convert files between hundreds of formats.\n\nWith support for PDFs, Office documents, images, HTML, and more, ConvertAPI MCP allows automated workflows such as document generation, file transformation, and data extraction directly from AI tools. It is designed for reliability, scalability, and ease of integration, making it suitable for both simple conversions and complex, production-grade pipelines.\n\nKey capabilities include:\n- Converting files between 200+ formats (PDF, DOCX, XLSX, PPTX, images, HTML, and more)\n- High-quality and performance PDF generation and manipulation\n- ISO 27001, SOC 2 certified security, HIPAA and GDPR compliance\n- Worldwide infrastructure with 99.95% uptime\n\nConvertAPI MCP is ideal for developers and teams looking to automate document workflows and enable AI-driven file processing with minimal setup. "
    icon: https://www.convertapi.com/static/img/branding/convertapi-icon-640x640.png
remote:
    transport_type: streamable-http
    url: https://mcp.convertapi.io/
oauth:
    - provider: convertapi-mcp
      secret: convertapi-mcp.personal_access_token
      env: CONVERTAPI_MCP_PERSONAL_ACCESS_TOKEN
