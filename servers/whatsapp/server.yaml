name: whatsapp
image: mcp/whatsapp
type: server
meta:
  category: messaging
  tags:
    - whatsapp
    - messaging
    - meta
    - business
about:
  title: WhatsApp Business API
  description: Send messages, manage templates, upload media, and manage your WhatsApp Business profile via the WhatsApp Cloud API.
  icon: https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg
source:
  project: https://github.com/digitalgym/aipathway-whatsapp-mcp
  commit: e0ce43f839018f3d78458a84678349853e2eba02
config:
  description: Configure WhatsApp Cloud API credentials from the Meta App Dashboard
  secrets:
    - name: whatsapp.access_token
      env: WHATSAPP_ACCESS_TOKEN
      example: EAAxxxxxxx
    - name: whatsapp.phone_number_id
      env: WHATSAPP_PHONE_NUMBER_ID
      example: "123456789"
    - name: whatsapp.business_account_id
      env: WHATSAPP_BUSINESS_ACCOUNT_ID
      example: "987654321"
  parameters:
    type: object
    properties:
      access_token:
        type: string
      phone_number_id:
        type: string
      business_account_id:
        type: string
    required:
      - access_token
      - phone_number_id
      - business_account_id
