name: route6
type: remote
dynamic:
  tools: true
meta:
  category: devops
  tags:
    - networking
    - ipv6
    - ai-agents
    - webhooks
    - remote
about:
  title: Route6
  description: Gives AI agents their own internet identity — a dedicated public IPv6 /64, DNS hostname, port forwarding with TLS, web fetch/search/scrape, and a private team mesh with coordination tools. Free tier, no card required.
  icon: https://route6.me/brand/route6-icon.png
remote:
  transport_type: streamable-http
  url: https://gw.route6.me/mcp
  headers:
    Authorization: "Bearer ${ROUTE6_API_KEY}"
config:
  description: Route6 API key — create a free account at https://route6.me (no card required); the key is shown in the dashboard.
  secrets:
    - name: route6.api_key
      env: ROUTE6_API_KEY
      example: <YOUR_API_KEY>
