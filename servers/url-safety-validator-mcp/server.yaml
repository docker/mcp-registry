name: url-safety-validator-mcp
type: remote
meta:
  category: security
  tags:
    - url-safety
    - phishing-detection
    - malware
    - web-risk
    - cybersecurity
    - safe-browsing
about:
  title: URL Safety Validator
  description: AI-powered URL safety check using Google Web Risk, Safe Browsing, RDAP, and SSL analysis. Returns SAFE/SUSPICIOUS/DANGEROUS verdict with agent_action.
  icon: https://www.google.com/s2/favicons?domain=kordagencies.com&sz=64
remote:
  transport:
    type: streamable-http
    url: https://url-safety-validator-mcp-production.up.railway.app/mcp
config:
  secrets:
    - name: url-safety-validator-mcp.api_key
      env: X_API_KEY
      example: your_api_key_from_kordagencies.com
      required: false
