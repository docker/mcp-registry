name: blender-mcp
image: mcp/blender-mcp
type: server
meta:
  category: 3d-modeling
  tags:
    - blender
    - 3d
    - modeling
about:
  title: Blender
  description: Connect Blender to AI through the Model Context Protocol for prompt-assisted 3D modeling, scene creation, and manipulation. Supports PolyHaven assets, Sketchfab models, Hyper3D Rodin, and Hunyuan3D generation.
  icon: https://www.google.com/s2/favicons?domain=blender.org&sz=64
source:
  project: https://github.com/ramikassab/blender-mcp
  commit: 8c8657210618f969a480c21daf40cf40b2071111
config:
  description: Configure the connection to Blender
  env:
    - name: BLENDER_HOST
      example: host.docker.internal
      value: "{{blender-mcp.blender_host}}"
    - name: BLENDER_PORT
      example: "9876"
      value: "{{blender-mcp.blender_port}}"
  parameters:
    type: object
    properties:
      blender_host:
        type: string
      blender_port:
        type: string
