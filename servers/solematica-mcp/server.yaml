name: solematica-mcp
description: Solar estimates, provider comparison, energy prices and blog for Italy
vendor: Solematica — Soloweb SRL
license: MIT
category: data
repository: https://github.com/n3m1/solematica-mcp
docs: https://www.solematica.it/sviluppatori
image: mcp/solematica-mcp
type: server
tools:
  - name: stima_solare
    description: Generate a full solar estimate for an Italian address
  - name: info_tetto
    description: Satellite roof analysis via Google Solar API
  - name: confronta_provider
    description: Compare 11 Italian solar providers
  - name: dettaglio_provider
    description: Full provider details with accessories and financing
  - name: prezzi_energia
    description: Current Italian energy prices (PUN/ARERA)
  - name: cerca_articoli
    description: Search Solematica blog articles
environment:
  - name: SOLEMATICA_API_KEY
    description: API key for stima_solare (optional, other tools are free)
    required: false