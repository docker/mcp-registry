name: markit
type: remote
meta:
  category: productivity
  tags:
    - productivity
    - bookmarks
    - knowledge
    - search
    - remote
about:
  title: MarkIt
  description: Search, save, and set reminders in your personal MarkIt library of links, posts, and notes - auto-organized and semantically indexed. Generate your API key at https://mark-it.co/settings.
  icon: https://mark-it.co/icon-512.png
remote:
  transport_type: streamable-http
  url: https://mark-it.co/api/mcp
  headers:
    Authorization: "Bearer ${MARKIT_API_KEY}"
config:
  secrets:
    - name: markit.api_key
      env: MARKIT_API_KEY
      example: mkt_your_key_here
