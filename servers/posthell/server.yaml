name: posthell
type: remote
dynamic:
  tools: true
meta:
  category: productivity
  tags:
    - social-media
    - scheduling
    - marketing
    - remote
about:
  title: posthell
  description: Draft, schedule, and publish social media posts to 15 networks from an approval-first queue
  icon: https://www.google.com/s2/favicons?domain=posthell.com&sz=64
remote:
  transport_type: streamable-http
  url: https://www.posthell.com/api/mcp
  headers:
    Authorization: "Bearer ${POSTHELL_API_KEY}"
config:
  secrets:
    - name: posthell.api_key
      env: POSTHELL_API_KEY
      example: <YOUR_API_KEY>
