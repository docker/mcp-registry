name: omnibase
image: mcp/omnibase
type: server
meta:
  category: database
  tags:
    - database
    - sql
    - postgresql
    - mysql
    - sqlite
    - security
about:
  title: Omnibase
  description: Give your AI agent secure access to any database. Supports PostgreSQL, MySQL, SQLite, and 50+ more through a single server with permission-based access controls.
  icon: https://avatars.githubusercontent.com/u/92644351?v=4
source:
  project: https://github.com/itsJeremyMax/omnibase
  commit: c4426294cff06ec2ad3c3df88077881e32afa894
run:
  volumes:
    - omnibase-config:/mcp
  env:
    OMNIBASE_CONFIG: /mcp/omnibase.config.yaml
