name: faction
image: mcp/faction
type: server
meta:
  category: security
  tags:
    - security
    - pentesting
    - assessments
    - vulnerabilities
about:
  title: Faction
  description: Manage penetration testing assessments, vulnerabilities, retests, and audit logs in the Faction platform. Exposes tools for querying and updating assessments, tracking vulnerabilities, scheduling retests, and accessing audit logs.
  icon: https://www.google.com/s2/favicons?domain=factionsecurity.com&sz=64
source:
  project: https://github.com/factionsecurity/faction-mcp
  commit: a6374f5d49fb0358be4cf942249fdd3876c6853d
config:
  description: Configure your Faction instance connection
  secrets:
    - name: faction.api_key
      env: FACTION_API_KEY
      example: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
      description: Your Faction API key. Generate one in Faction under your user profile settings.
  env:
    - name: FACTION_BASE_URL
      example: https://faction.yourcompany.com
      value: "{{faction.base_url}}"
  parameters:
    type: object
    properties:
      base_url:
        type: string
        description: The base URL of your Faction instance (e.g. https://faction.yourcompany.com)
    required:
      - base_url
